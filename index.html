<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Atendemos para Encantar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f8;
            color: #333;
        }
        header {
            background-color: #0b3c5d;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        header h1 {
            margin: 0 0 12px 0;
            font-size: 32px;
        }
        .empresas {
            font-size: 15px;
            font-weight: bold;
        }
        main {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 15px;
        }
        .galeria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .galeria img {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        footer {
            margin-top: 40px;
            background-color: #eaeaea;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>Atendemos para Encantar</h1>
    <div class="empresas">
        JMEF Serviços e Manutenções • Bolconte Facilities • Bio Control • Fênix Jardinagens
    </div>
</header>

<main>
    <div class="galeria">
        
    <img src="fotos-atuais/foto1.png" alt="Foto 1">
    <img src="fotos-atuais/foto2.png" alt="Foto 2">
    <img src="fotos-atuais/foto3.png" alt="Foto 3">
    <img src="fotos-atuais/foto4.png" alt="Foto 4">
    <img src="fotos-atuais/foto5.png" alt="Foto 5">
    <img src="fotos-atuais/foto6.png" alt="Foto 6">
    <img src="fotos-atuais/foto7.png" alt="Foto 7">

    </div>
</main>

<footer>
    Atendemos para Encantar • Serviços realizados com excelência
</footer>

</body>
</html>
